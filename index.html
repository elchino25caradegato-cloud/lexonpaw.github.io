<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexonPaw</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#121212;
color:white;
}

header{
height:300px;
background:linear-gradient(135deg,#2ecc71,#ff9800);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-size:60px;
}

header p{
margin-top:10px;
font-size:20px;
}

.download{
margin-top:25px;
background:white;
color:black;
padding:15px 30px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

main{
padding:30px;
}

h2{
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin-top:15px;
}

.card p{
margin:10px 0;
color:#ccc;
}

.card a{
display:inline-block;
padding:10px 20px;
background:#2ecc71;
color:white;
border-radius:8px;
text-decoration:none;
}

footer{
margin-top:50px;
padding:20px;
text-align:center;
background:#0d0d0d;
color:#777;
}

.plus{
position:fixed;
right:25px;
bottom:25px;
width:65px;
height:65px;
border-radius:50%;
background:#ff9800;
font-size:40px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

.plus:hover{
transform:scale(1.1);
}

input{
display:none;
}

</style>

</head>

<body>

<header>

<h1>LEXONPAW</h1>

<p>Minecraft Bedrock Creator</p>

<a class="download" href="#">
⬇ Descargar último Pack
</a>

</header>

<main>

<h2>Mis Packs</h2>

<div class="cards">

<div class="card">

<img src="https://placehold.co/600x300/png" alt="Pack">

<h3>Mi Primer Pack</h3>

<p>Aquí irá la descripción de tu pack.</p>

<a href="#">Descargar</a>

</div>

</div>

</main>

<footer>

🐾 Powered by LexonPaw

</footer>

<label class="plus" for="archivo">+</label>

<input type="file" id="archivo">

<script>

document.getElementById("archivo").addEventListener("change",function(){

if(this.files.length>0){

alert("Seleccionaste: "+this.files[0].name);

}

});

</script>

</body>
  </html>
